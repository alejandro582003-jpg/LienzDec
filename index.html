<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #FAF8F3;
    --warm-white: #F4F1EA;
    --border: #E2DDD5;
    --ink: #1E1C18;
    --muted: #9A9487;
    --light-muted: #C4BEB3;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--cream); border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 200;
  }
  .logo-area { display: flex; align-items: center; gap: 10px; }
  .logo-box { width: 40px; height: 40px; background: #111; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
  .logo-box img { width: 100%; height: 100%; object-fit: contain; padding: 3px; }
  .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; letter-spacing: 0.06em; }
  nav { display: flex; gap: 1.4rem; }
  nav a { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
  nav a:hover { color: var(--ink); }
  @media (max-width: 480px) {
    nav { gap: 0.9rem; }
    nav a { font-size: 0.62rem; letter-spacing: 0.08em; }
    .brand { font-size: 1.2rem; }
  }

  /* HERO */
  .hero { text-align: center; padding: 3.5rem 1.5rem 2.5rem; border-bottom: 1px solid var(--border); }
  .hero-eyebrow { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--light-muted); margin-bottom: 0.8rem; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 6vw, 3.8rem); font-weight: 300; letter-spacing: 0.03em; margin-bottom: 0.8rem; }
  .hero p { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.03em; max-width: 380px; margin: 0 auto; line-height: 1.7; }

  /* FILTERS */
  .filter-bar {
    display: flex; justify-content: center; align-items: center;
    gap: 0.35rem; padding: 1.1rem 1rem; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); background: var(--warm-white);
  }
  .filter-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-family: 'Jost', sans-serif; font-size: 0.65rem; font-weight: 400;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 12px;
    border-radius: 1px; cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
  .filter-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  .count-bar { text-align: center; padding: 1.1rem 1rem 0.6rem; font-size: 0.65rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--light-muted); }

  /* MASONRY — 3 col desktop, 2 col tablet+móvil */
  .masonry {
    column-count: 3;
    column-gap: 14px;
    padding: 1rem 2rem 5rem;
    max-width: 1280px;
    margin: 0 auto;
  }
  @media (max-width: 860px) {
    .masonry { column-count: 2; padding: 0.8rem 1rem 4rem; column-gap: 10px; }
  }

  /* CARD */
  .card { break-inside: avoid; margin-bottom: 14px; background: #fff; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; transition: transform .3s cubic-bezier(.2,.8,.3,1), box-shadow .3s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.08); }
  .card.hidden { display: none; }

  .card-img-wrap { position: relative; cursor: zoom-in; overflow: hidden; background: #EDE9E0; }
  .card-img-wrap img { width: 100%; display: block; object-fit: cover; transition: transform .4s cubic-bezier(.2,.8,.3,1); }
  .card-img-wrap:hover img { transform: scale(1.04); }
  .zoom-hint { position: absolute; bottom: 7px; right: 7px; background: rgba(30,28,24,0.65); color: #FAF8F3; font-size: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 7px; border-radius: 1px; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .card-img-wrap:hover .zoom-hint { opacity: 1; }

  .card-body { padding: 0.7rem 0.8rem 0.85rem; border-top: 1px solid var(--border); }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 0.88rem; font-style: italic; font-weight: 400; color: var(--ink); margin-bottom: 2px; line-height: 1.35; }
  .card-artist { font-size: 0.63rem; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.65rem; }

  .wa-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--ink); color: var(--cream);
    font-family: 'Jost', sans-serif; font-size: 0.58rem; font-weight: 400;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 10px;
    border-radius: 1px; text-decoration: none; transition: background .2s;
  }
  .wa-btn:hover { background: #3a3830; }
  /* Toque más fácil en móvil */
  @media (max-width: 860px) {
    .wa-btn { padding: 7px 12px; font-size: 0.62rem; }
    .card-title { font-size: 0.82rem; }
    .card-body { padding: 0.6rem 0.7rem 0.75rem; }
  }
  .wa-icon { width: 11px; height: 11px; fill: var(--cream); flex-shrink: 0; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(12,10,8,0.97); flex-direction: column; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lb-close {
    position: fixed; top: 1rem; left: 1rem;
    display: flex; align-items: center; gap: 7px;
    background: rgba(250,248,243,0.1); border: 1px solid rgba(250,248,243,0.2);
    color: #FAF8F3; font-family: 'Jost', sans-serif; font-size: 0.68rem;
    letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 14px;
    border-radius: 1px; cursor: pointer; transition: background .2s; z-index: 1001;
    /* Área táctil amplia en móvil */
    min-height: 40px;
  }
  .lb-close:hover { background: rgba(250,248,243,0.22); }
  .lb-close svg { width: 13px; height: 13px; fill: #FAF8F3; }
  .lb-img-wrap { max-width: min(94vw, 1100px); max-height: 78vh; display: flex; align-items: center; justify-content: center; margin-top: 1rem; }
  .lb-img-wrap img { max-width: 100%; max-height: 78vh; object-fit: contain; border-radius: 2px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); animation: imgIn .3s cubic-bezier(.2,.8,.3,1); }
  @keyframes imgIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .lb-info { margin-top: 1rem; text-align: center; padding: 0 1rem; }
  .lb-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: #FAF8F3; letter-spacing: 0.03em; }
  .lb-artist { font-size: 0.68rem; letter-spacing: 0.1em; color: rgba(250,248,243,0.45); margin-top: 4px; text-transform: uppercase; }

  /* FOOTER */
  footer { text-align: center; padding: 2rem 1.5rem; border-top: 1px solid var(--border); background: var(--warm-white); }
  footer p { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--light-muted); text-transform: uppercase; }
  .footer-brand { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 0.3rem; display: block; }
</style>

obras.forEach(o => {
  const msg = encodeURIComponent(`Hola, me interesa el cuadro "${o.title}" (${o.artist}) del catálogo LienzDec. ¿Me pueden dar más información?`);
  const waLink = `https://wa.me/${WA}?text=${msg}`;
  const h = Math.round(o.h * heightScale);

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cat = o.cat;
  card.innerHTML = `
    <div class="card-img-wrap"
         data-url="${o.url}"
         data-title="${o.title.replace(/"/g,'&quot;')}"
         data-artist="${o.artist.replace(/"/g,'&quot;')}">
      <img src="${o.url}" alt="${o.title}" style="height:${h}px" loading="lazy">
      <span class="zoom-hint">Ver completo</span>
    </div>
    <div class="card-body">
      <p class="card-title">${o.title}</p>
      <p class="card-artist">${o.artist}</p>
      <a class="wa-btn" href="${waLink}" target="_blank" rel="noopener">${waIconSVG} Consultar</a>
    </div>`;
  gallery.appendChild(card);
});

// Lightbox
gallery.addEventListener('click', e => {
  const wrap = e.target.closest('.card-img-wrap');
  if (!wrap) return;
  lbImg.src = wrap.dataset.url;
  lbImg.alt = wrap.dataset.title;
  lbTitle.textContent = wrap.dataset.title;
  lbArtist.textContent = wrap.dataset.artist;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
});

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { lbImg.src = ''; }, 300);
}
document.getElementById('lb-close').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    let visible = 0;
    document.querySelectorAll('.card').forEach(card => {
      const show = filter === 'all' || card.dataset.cat === filter;
      card.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    countLabel.textContent = visible + (visible === 1 ? ' obra disponible' : ' obras disponibles');
  });
});
</script>
