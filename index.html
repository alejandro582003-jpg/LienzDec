<style>

  :root { --cream: #FAF8F3; --warm-white: #F4F1EA; --border: #E2DDD5; --ink: #1E1C18; --muted: #9A9487; --light-muted: #C4BEB3; }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }

  header { background: var(--cream); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; position: sticky; top: 0; z-index: 200; }
  .logo-area { display: flex; align-items: center; gap: 10px; cursor: pointer; flex-shrink: 0; }
  .logo-box { width: 44px; height: 44px; background: transparent; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
  .logo-box img { width: 100%; height: 100%; object-fit: contain; padding: 3px; }
  .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; letter-spacing: 0.06em; }

  /* Buscador */
  .search-wrap { flex: 1; max-width: 320px; position: relative; }
  .search-wrap input { width: 100%; background: var(--warm-white); border: 1px solid var(--border); color: var(--ink); font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 300; letter-spacing: 0.04em; padding: 7px 32px 7px 12px; border-radius: 1px; outline: none; transition: border-color .2s; }
  .search-wrap input::placeholder { color: var(--light-muted); }
  .search-wrap input:focus { border-color: var(--muted); }
  .search-wrap .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; }
  .search-wrap .search-icon svg { width: 13px; height: 13px; fill: var(--light-muted); display: block; }
  .search-wrap .clear-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 2px; display: none; }
  .search-wrap .clear-btn svg { width: 13px; height: 13px; fill: var(--muted); display: block; }

  .nav-links { display: flex; gap: 1.4rem; flex-shrink: 0; }

  .breadcrumb { display: none; align-items: center; gap: 0.5rem; padding: 0.9rem 2rem; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--light-muted); border-bottom: 1px solid var(--border); background: var(--warm-white); flex-wrap: wrap; }
  .breadcrumb.visible { display: flex; }
  .breadcrumb span { cursor: pointer; transition: color .2s; }
  .breadcrumb span:hover { color: var(--ink); }
  .breadcrumb .sep { color: var(--border); cursor: default; }
  .breadcrumb .current { color: var(--muted); cursor: default; }

  .hero { text-align: center; padding: 4rem 1.5rem 2.5rem; border-bottom: 1px solid var(--border); }
  .hero-eyebrow { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--light-muted); margin-bottom: 0.8rem; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3.4rem); font-weight: 300; letter-spacing: 0.03em; margin-bottom: 0.8rem; }
  .hero p { font-size: 0.85rem; color: var(--muted); max-width: 400px; margin: 0 auto; line-height: 1.7; }

  .section-label { text-align: center; padding: 2rem 1.5rem 1rem; font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--light-muted); }

  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 0.5rem 2rem 4rem; max-width: 1200px; margin: 0 auto; }
  @media (max-width: 860px) { .cat-grid { grid-template-columns: repeat(2, 1fr); padding: 0.5rem 1rem 3rem; } }
  @media (max-width: 480px) { .cat-grid { grid-template-columns: 1fr; } }

  .cat-card { background: #fff; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; cursor: pointer; transition: transform .3s cubic-bezier(.2,.8,.3,1), box-shadow .3s; display: flex; flex-direction: column; }
  .cat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
  .cat-cover { height: 200px; background: #EDE9E0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .cat-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s cubic-bezier(.2,.8,.3,1); }
  .cat-card:hover .cat-cover img { transform: scale(1.05); }
  .cat-cover-placeholder { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--light-muted); font-style: italic; }
  .cat-body { padding: 1rem 1.1rem 1.1rem; border-top: 1px solid var(--border); flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .cat-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: var(--ink); margin-bottom: 4px; }
  .cat-meta { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--light-muted); margin-bottom: 0.8rem; }
  .cat-arrow { display: inline-flex; align-items: center; gap: 5px; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); transition: color .2s, gap .2s; }
  .cat-card:hover .cat-arrow { color: var(--ink); gap: 8px; }
  .cat-arrow svg { width: 12px; height: 12px; fill: currentColor; }

  /* Ajustado el padding inferior para dar espacio a la paginación */
  .masonry { column-count: 3; column-gap: 14px; padding: 1rem 2rem 2rem; max-width: 1280px; margin: 0 auto; }
  @media (max-width: 860px) { .masonry { column-count: 2; padding: 0.8rem 1rem 2rem; column-gap: 10px; } }

  .img-card { break-inside: avoid; margin-bottom: 14px; background: #fff; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; transition: transform .3s cubic-bezier(.2,.8,.3,1), box-shadow .3s; }
  .img-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.08); }

  .img-wrap { position: relative; cursor: zoom-in; overflow: hidden; background: #EDE9E0; }
  .img-wrap img { width: 100%; display: block; object-fit: cover; transition: transform .4s cubic-bezier(.2,.8,.3,1), opacity .3s; opacity: 0; }
  .img-wrap img.loaded { opacity: 1; }
  .img-wrap:hover img.loaded { transform: scale(1.04); }
  .zoom-hint { position: absolute; bottom: 7px; right: 7px; background: rgba(30,28,24,0.65); color: #FAF8F3; font-size: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 7px; border-radius: 1px; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .img-wrap:hover .zoom-hint { opacity: 1; }

  /* Skeleton loading */
  .skeleton {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, #EDE9E0 25%, #E4DFD6 50%, #EDE9E0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    z-index: 1;
    transition: opacity .3s;
  }
  .skeleton.hidden { opacity: 0; pointer-events: none; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .watermark { position: absolute; bottom: 8px; left: 8px; width: 28%; max-width: 90px; opacity: 0.22; pointer-events: none; user-select: none; transition: opacity .3s; z-index: 2; filter: brightness(0) invert(1); }
  .img-wrap:hover .watermark { opacity: 0.15; }
  .lb-img-wrap { position: relative; }
  .lb-watermark { position: absolute; bottom: 14px; left: 14px; width: 110px; opacity: 0.2; pointer-events: none; user-select: none; z-index: 2; filter: brightness(0) invert(1); }

  .img-body { padding: 0.7rem 0.8rem 0.85rem; border-top: 1px solid var(--border); }
  .img-title { font-family: 'Cormorant Garamond', serif; font-size: 0.88rem; font-style: italic; color: var(--ink); margin-bottom: 2px; line-height: 1.35; }
  .img-sub { font-size: 0.63rem; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.65rem; }
  .wa-btn { display: inline-flex; align-items: center; gap: 5px; background: var(--ink); color: var(--cream); font-family: 'Jost', sans-serif; font-size: 0.58rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 10px; border-radius: 1px; text-decoration: none; transition: background .2s; }
  .wa-btn:hover { background: #3a3830; }

  .pagination button { background: transparent; border: 1px solid var(--border); color: var(--ink); font-family: 'Jost', sans-serif; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 16px; border-radius: 1px; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
  .pagination button svg { width: 12px; height: 12px; fill: currentColor; }
  .pagination button:hover:not(:disabled) { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .pagination button:disabled { opacity: 0.35; cursor: not-allowed; }
  .pagination .page-info-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .pagination span.page-num { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; }
  .pagination span.page-obras { font-size: 0.62rem; color: var(--light-muted); letter-spacing: 0.04em; }

  .view { display: none; }

  .back-btn { display: inline-flex; align-items: center; gap: 7px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Jost', sans-serif; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 14px; border-radius: 1px; cursor: pointer; transition: all .2s; margin: 1.5rem 2rem 0; }

  .lb-close { position: fixed; top: 1rem; left: 1rem; display: flex; align-items: center; gap: 7px; background: rgba(250,248,243,0.1); border: 1px solid rgba(250,248,243,0.2); color: #FAF8F3; font-family: 'Jost', sans-serif; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 14px; border-radius: 1px; cursor: pointer; transition: background .2s; z-index: 1001; min-height: 40px; }

  .lb-close svg { width: 13px; height: 13px; fill: #FAF8F3; }
  .lb-img-wrap { max-width: min(94vw, 1100px); max-height: 78vh; display: flex; align-items: center; justify-content: center; margin-top: 1rem; }
  .lb-img-wrap img { max-width: 100%; max-height: 78vh; object-fit: contain; border-radius: 2px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); animation: imgIn .3s cubic-bezier(.2,.8,.3,1); }
  @keyframes imgIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .lb-info { margin-top: 1rem; text-align: center; padding: 0 1rem; }
  .lb-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: #FAF8F3; }
  .lb-sub { font-size: 0.68rem; letter-spacing: 0.1em; color: rgba(250,248,243,0.45); margin-top: 4px; text-transform: uppercase; }

  .search-results-header { text-align: center; padding: 2rem 1.5rem 0.5rem; }

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const bcCat = document.getElementById('bc-cat');
  const bcSub = document.getElementById('bc-sub');
  const sep = document.querySelector('.bc-sub-sep');
  if (!currentCat) { bc.classList.remove('visible'); return; }
  bc.classList.add('visible');
  bcCat.textContent = currentCat.name;
  if (currentSubcat) { sep.style.display = ''; bcSub.textContent = currentSubcat.name; }
  else { sep.style.display = 'none'; bcSub.textContent = ''; }
}

function goToCategory() { if (currentCat) openCategory(currentCat); }

function renderHome() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  catalogo.forEach(cat => {
    const total = cat.subcats
      ? cat.subcats.reduce((a, s) => a + s.images.length, 0)
      : (cat.images ? cat.images.length : 0);
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML = `
      <div class="cat-cover">
        ${cat.cover ? `<img src="${cat.cover}" alt="${cat.name}" loading="lazy">` : `<span class="cat-cover-placeholder">${cat.name[0]}</span>`}
      </div>
      <div class="cat-body">
        <div>
          <p class="cat-name">${cat.name}</p>
          <p class="cat-meta">${cat.subcats ? cat.subcats.length + ' subcategorías' : total + ' obras'}</p>
        </div>
        <span class="cat-arrow">Ver colección ${arrowSVG}</span>
      </div>`;
    card.addEventListener('click', () => openCategory(cat));
    grid.appendChild(card);
  });
}

function renderSubcats(cat) {
  document.getElementById('subcat-title').textContent = cat.name;
  const grid = document.getElementById('subcat-grid');
  grid.innerHTML = '';
  cat.subcats.forEach(sub => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML = `
      <div class="cat-cover">
        ${sub.cover ? `<img src="${sub.cover}" alt="${sub.name}" loading="lazy">` : `<span class="cat-cover-placeholder">${sub.name[0]}</span>`}
      </div>
      <div class="cat-body">
        <div>
          <p class="cat-name">${sub.name}</p>
          <p class="cat-meta">${sub.images.length} obras</p>
        </div>
        <span class="cat-arrow">Ver obras ${arrowSVG}</span>
      </div>`;
    card.addEventListener('click', () => openSubcat(sub));
    grid.appendChild(card);
  });
}

// Renderizar la galería con paginación
function renderGallery(images, title, hasParent, page = 1) {
  currentPage = page;
  currentGalleryImages = images;
  currentGalleryTitle = title;
  currentGalleryHasParent = hasParent;

  document.getElementById('gallery-title').textContent = title;
  document.getElementById('gallery-back-btn').onclick = hasParent ? goToCategory : goHome;
  
  const grid = document.getElementById('gallery-grid');
  const paginationControls = document.getElementById('pagination-controls');
  grid.innerHTML = '';

  if (!images || images.length === 0) {
    grid.innerHTML = '<p class="empty-msg">Imágenes próximamente</p>';
    paginationControls.style.display = 'none';
    return;
  }

  // Lógica de Paginación
  const totalPages = Math.ceil(images.length / itemsPerPage);
  const startIndex = (currentPage - 1) * itemsPerPage;
  const endIndex = startIndex + itemsPerPage;
  const paginatedImages = images.slice(startIndex, endIndex);

  const scale = window.innerWidth <= 860 ? 0.65 : 1;
  paginatedImages.forEach(img => {
    const msg = encodeURIComponent(`Hola, me interesa el cuadro "${img.title}" del catálogo LienzDec. ¿Me pueden dar más información?`);
    const h = Math.round((img.h || 280) * scale);
    const card = document.createElement('div');
    card.className = 'img-card';
    card.innerHTML = `
      <div class="img-wrap" data-url="${img.url}" data-title="${(img.title||'').replace(/"/g,'&quot;')}" data-sub="${(img.sub||'').replace(/"/g,'&quot;')}">
        <img src="${img.url}" alt="${img.title}" style="height:${h}px" loading="lazy">
        <img class="watermark" src="https://i.ibb.co/wNbS2Yn1/Logo-Lienz-Dec-recortado-removebg-preview.png" alt="" draggable="false">
        <span class="zoom-hint">Ver completo</span>
      </div>
      <div class="img-body">
        <p class="img-title">${img.title||''}</p>
        ${img.sub ? `<p class="img-sub">${img.sub}</p>` : ''}
        <a class="wa-btn" href="https://wa.me/${WA}?text=${msg}" target="_blank" rel="noopener">${waIconSVG} Consultar</a>
      </div>`;
    grid.appendChild(card);
  });

  renderPaginationControls(totalPages, images.length);
}

// Configurar los botones de paginación
function renderPaginationControls(totalPages, totalImages) {
  const controls = document.getElementById('pagination-controls');
  
  if (totalPages <= 1) {
    controls.style.display = 'none';
    return;
  }
  
  controls.style.display = 'flex';
  const prevBtn = document.getElementById('page-prev');
  const nextBtn = document.getElementById('page-next');
  const pageInfo = document.getElementById('page-info');
  const pageObras = document.getElementById('page-obras');

  prevBtn.disabled = currentPage === 1;
  nextBtn.disabled = currentPage === totalPages;
  pageInfo.textContent = `Página ${currentPage} de ${totalPages}`;

  const start = (currentPage - 1) * itemsPerPage + 1;
  const end = Math.min(currentPage * itemsPerPage, totalImages);
  pageObras.textContent = `${start}–${end} de ${totalImages} obras`;
}

// Función que se activa al darle clic a Anterior / Siguiente
function changePage(delta) {
  const totalPages = Math.ceil(currentGalleryImages.length / itemsPerPage);
  let newPage = currentPage + delta;
  
  if (newPage >= 1 && newPage <= totalPages) {
    renderGallery(currentGalleryImages, currentGalleryTitle, currentGalleryHasParent, newPage);
    // Subir al inicio de la vista de galería al cambiar de página
    document.getElementById('gallery-back-btn').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ── LIGHTBOX ───────────────────────────────────────────────────────────────
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbTitle = document.getElementById('lb-title');
const lbSub = document.getElementById('lb-sub');

document.getElementById('gallery-grid').addEventListener('click', e => {
  const wrap = e.target.closest('.img-wrap');
  if (!wrap) return;
  lbImg.src = wrap.dataset.url;
  lbImg.alt = wrap.dataset.title;
  lbTitle.textContent = wrap.dataset.title;
  lbSub.textContent = wrap.dataset.sub;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
});

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { lbImg.src = ''; }, 300);
}
document.getElementById('lb-close').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── BUSCADOR GLOBAL ────────────────────────────────────────────────────────

function buildSearchIndex() {
  const index = [];
  catalogo.forEach(cat => {
    if (cat.subcats) {
      cat.subcats.forEach(sub => {
        sub.images.forEach(img => {
          index.push({
            ...img,
            catName: cat.name,
            subcatName: sub.name,
            catTags: cat.tags || "",
            subcatTags: sub.tags || "",
            imgTags: img.tags || ""
          });
        });
      });
    } else if (cat.images) {
      cat.images.forEach(img => {
        index.push({
          ...img,
          catName: cat.name,
          subcatName: null,
          catTags: cat.tags || "",
          subcatTags: "",
          imgTags: img.tags || ""
        });
      });
    }
  });
  return index;
}

function renderSearchResults(query) {
  const q = query.trim().toLowerCase();
  if (!q) { clearSearch(); return; }

  const results = searchIndex.filter(img => {
    return (img.title || '').toLowerCase().includes(q)
        || (img.sub || '').toLowerCase().includes(q)
        || (img.catName || '').toLowerCase().includes(q)
        || (img.subcatName || '').toLowerCase().includes(q)
        || (img.catTags || '').toLowerCase().includes(q)
        || (img.subcatTags || '').toLowerCase().includes(q)
        || (img.imgTags || '').toLowerCase().includes(q);
  });

  showView('view-search');
  currentCat = null; currentSubcat = null;
  updateBreadcrumb();
  document.getElementById('search-results-title').textContent = `"${query}"`;
  document.getElementById('search-results-count').textContent =
    results.length === 0 ? 'Sin resultados' :
    results.length === 1 ? '1 obra encontrada' :
    `${results.length} obras encontradas`;

  const grid = document.getElementById('search-grid');
  grid.innerHTML = '';

  if (results.length === 0) {
    grid.innerHTML = `
      <div class="no-results" style="grid-column:1/-1;column-span:all">
        <p>No encontramos nada</p>
        <span>Intenta con otro término — artista, categoría o nombre de obra</span>
      </div>`;
    return;
  }

  const scale = window.innerWidth <= 860 ? 0.65 : 1;
  results.forEach(img => {
    const msg = encodeURIComponent(`Hola, me interesa el cuadro "${img.title}" del catálogo LienzDec. ¿Me pueden dar más información?`);
    const h = Math.round((img.h || 280) * scale);
    const label = img.subcatName ? `${img.catName} › ${img.subcatName}` : img.catName;
    const card = document.createElement('div');
    card.className = 'img-card';
    card.innerHTML = `
      <div class="img-wrap" data-url="${img.url}" data-title="${(img.title||'').replace(/"/g,'&quot;')}" data-sub="${(img.sub||'').replace(/"/g,'&quot;')}">
        <div class="skeleton"></div>
        <img src="${img.url}" alt="${img.title||''}" style="height:${h}px" loading="lazy"
             onload="this.classList.add('loaded');this.previousElementSibling.classList.add('hidden')">
        <img class="watermark" src="https://i.ibb.co/wNbS2Yn1/Logo-Lienz-Dec-recortado-removebg-preview.png" alt="" draggable="false">
        <span class="zoom-hint">Ver completo</span>
      </div>
      <div class="img-body">
        <span class="search-result-cat">${label}</span>
        <p class="img-title">${img.title||''}</p>
        ${img.sub ? `<p class="img-sub">${img.sub}</p>` : ''}
        <a class="wa-btn" href="https://wa.me/${WA}?text=${msg}" target="_blank" rel="noopener">${waIconSVG} Consultar</a>
      </div>`;
    grid.appendChild(card);
  });
}

function clearSearch() {
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  const clearBtn = document.getElementById('search-clear');
  const searchIcon = document.getElementById('search-icon');
  if (clearBtn) clearBtn.style.display = 'none';
  if (searchIcon) searchIcon.style.display = '';
  goHome();
}

// Lightbox para resultados de búsqueda
document.getElementById('search-grid').addEventListener('click', e => {
  const wrap = e.target.closest('.img-wrap');
  if (!wrap) return;
  lbImg.src = wrap.dataset.url;
  lbImg.alt = wrap.dataset.title;
  lbTitle.textContent = wrap.dataset.title;
  lbSub.textContent = wrap.dataset.sub;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
});

// ── INIT ───────────────────────────────────────────────────────────────────
renderHome();

// Construir índice DESPUÉS de que catalogo está definido
const searchIndex = buildSearchIndex();

// Navegar a hash si existe en la URL al cargar
function navigateToHash() {
  const hash = window.location.hash.replace('#', '');
  if (!hash) return;

  const parts = hash.split('/');
  const catId = parts[0];
  const subId = parts[1] || null;

  const cat = catalogo.find(c => c.id === catId);
  if (!cat) return;

  currentCat = cat;

  if (subId && cat.subcats) {
    const sub = cat.subcats.find(s => s.id === subId);
    if (sub) {
      currentSubcat = sub;
      updateBreadcrumb();
      renderGallery(sub.images, sub.name, true, 1);
      showView('view-gallery');
      return;
    }
  }

  // Solo categoría sin subcategoría
  currentSubcat = null;
  updateBreadcrumb();
  if (cat.subcats) {
    renderSubcats(cat);
    showView('view-subcats');
  } else {
    renderGallery(cat.images, cat.name, false, 1);
    showView('view-gallery');
  }
}

navigateToHash();

// ── BOTÓN RETROCESO DEL DISPOSITIVO ───────────────────────────────────────
// Usamos pushState en lugar de replaceState para que el historial quede registrado
// y el botón físico de retroceso navegue dentro del catálogo

function goHome() {
  currentCat = null; currentSubcat = null;
  updateBreadcrumb();
  history.pushState({ view: 'home' }, '', window.location.pathname);
  showView('view-home');
}

// Sobreescribir openCategory y openSubcat para usar pushState
const _openCategory = openCategory;
function openCategory(cat) {
  currentCat = cat; currentSubcat = null; updateBreadcrumb();
  history.pushState({ view: cat.subcats ? 'subcats' : 'gallery', catId: cat.id }, '', '#' + cat.id);
  if (cat.subcats) { renderSubcats(cat); showView('view-subcats'); }
  else { renderGallery(cat.images, cat.name, false, 1); showView('view-gallery'); }
}

function openSubcat(sub) {
  currentSubcat = sub; updateBreadcrumb();
  history.pushState({ view: 'gallery', catId: currentCat.id, subId: sub.id }, '', '#' + currentCat.id + '/' + sub.id);
  renderGallery(sub.images, sub.name, true, 1); showView('view-gallery');
}

// Escuchar el botón de retroceso del dispositivo
window.addEventListener('popstate', (e) => {
  const state = e.state;

  // Si el lightbox está abierto, cerrarlo primero
  if (lightbox.classList.contains('open')) {
    closeLightbox();
    return;
  }

  if (!state || state.view === 'home') {
    currentCat = null; currentSubcat = null;
    updateBreadcrumb(); showView('view-home');
    return;
  }

  const cat = catalogo.find(c => c.id === state.catId);
  if (!cat) { goHome(); return; }

  currentCat = cat;

  if (state.view === 'subcats') {
    currentSubcat = null; updateBreadcrumb();
    renderSubcats(cat); showView('view-subcats');
  } else if (state.view === 'gallery') {
    if (state.subId && cat.subcats) {
      const sub = cat.subcats.find(s => s.id === state.subId);
      if (sub) {
        currentSubcat = sub; updateBreadcrumb();
        renderGallery(sub.images, sub.name, true, 1); showView('view-gallery');
        return;
      }
    }
    currentSubcat = null; updateBreadcrumb();
    renderGallery(cat.images, cat.name, false, 1); showView('view-gallery');
  }
});

// Estado inicial en el historial
history.replaceState({ view: 'home' }, '', window.location.pathname);

// Listener del buscador
let searchTimer;
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim();
  const clearBtn = document.getElementById('search-clear');
  const searchIcon = document.getElementById('search-icon');
  clearBtn.style.display = q ? 'block' : 'none';
  searchIcon.style.display = q ? 'none' : '';
  clearTimeout(searchTimer);
  if (!q) { clearSearch(); return; }
  searchTimer = setTimeout(() => renderSearchResults(this.value), 300);
});
</script>
